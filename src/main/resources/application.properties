spring.application.name=finance-tracker
server.port=${PORT}

# Datasource/Datasource

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database=postgresql

# JobRunr config

org.jobrunr.background-job-server.enabled=true
org.jobrunr.dashboard.enabled=true
org.jobrunr.dashboard.port=${JOBRUNR_DASHBOARD_PORT}

# JWT Details

security.jwt.jwt-secret=${JWT_SECRET}
security.jwt.jwt-expiry=${JWT_EXPIRY}

# SMTP Details

spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.mail.from=${EMAIL_FROM}

# S3 Config Details

s3.access-key-id=${S3_ACCESS_KEY_ID}
s3.secret-access-key=${S3_SECRET_ACCESS_KEY}
s3.region=${S3_REGION}
s3.bucket-name=${S3_BUCKET_NAME}

frontend.base-url=${FE_BASE_URL}
gemini.api.base-url=${GEMINI_API_BASE_URL}
gemini.api.key=${GEMINI_API_KEY}
gemini.ai.model=${GEMINI_AI_MODEL}


spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=360000

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.cors.allowed-origins=${FE_BASE_URL}
