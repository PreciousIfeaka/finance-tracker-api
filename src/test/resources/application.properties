# Override properties for test context loading only
server.port=8080

# Datasource - use in-memory H2 to avoid needing a real PostgreSQL instance
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable Flyway so H2 schema is managed by Hibernate
spring.flyway.enabled=false

# JobRunr - disable background server and dashboard
org.jobrunr.background-job-server.enabled=false
org.jobrunr.dashboard.enabled=false
org.jobrunr.dashboard.port=8000

# JWT stub values
security.jwt.jwt-secret=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3Rpbmctb25seQ==
security.jwt.jwt-expiry=3600000

# Mail stub values
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@test.com
spring.mail.password=test
app.mail.from=noreply@test.com

# S3 stub values
s3.access-key-id=dummy-access-key
s3.secret-access-key=dummy-secret-key
s3.region=us-east-1
s3.bucket-name=test-bucket

# API stub values
frontend.base-url=http://localhost:3000
gemini.api.base_url=http://localhost:9999
gemini.api.key=dummy-gemini-key
gemini.ai.model=gemini-2.0-flash

# CORS
app.cors.allowed-origins=http://localhost:3000

# Logs config
logging.level.root=error
